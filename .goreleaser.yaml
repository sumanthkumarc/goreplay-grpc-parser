version: 2

project_name: goreplay-grpc-parser

before:
  hooks:
    - go mod tidy

builds:
  - id: linux-amd64
    main: .
    binary: parser
    env:
      - CGO_ENABLED=1
    goos: [linux]
    goarch: [amd64]
    ldflags: [-s -w]

  - id: darwin-amd64
    main: .
    binary: parser
    env:
      - CGO_ENABLED=1
    goos: [darwin]
    goarch: [amd64]
    ldflags: [-s -w]

  - id: darwin-arm64
    main: .
    binary: parser
    env:
      - CGO_ENABLED=1
    goos: [darwin]
    goarch: [arm64]
    ldflags: [-s -w]

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
